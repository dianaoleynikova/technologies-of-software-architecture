services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mywebapp
      POSTGRES_PASSWORD: mywebapp123
      POSTGRES_DB: mywebapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywebapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: mywebapp
      DB_PASSWORD: mywebapp123
      DB_NAME: mywebapp
      PORT: 5000
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - appnet
    restart: on-failure

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge

