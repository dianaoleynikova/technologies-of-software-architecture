name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to target
    runs-on: self-hosted

    steps:
      - name: Setup known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.TARGET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no diana@${{ secrets.TARGET_HOST }} \
            "cd ~ && \
            if [ ! -d app ]; then git clone https://github.com/dianaoleynikova/technologies-of-software-architecture app; fi && \
            cd app && \
            git pull origin main && \
            docker-compose down && \
            docker-compose up -d --build"

      - name: Verify deployment
        run: |
          sleep 15
          ssh -o StrictHostKeyChecking=no diana@${{ secrets.TARGET_HOST }} \
            "curl -sf http://localhost/health/alive && echo 'Service is UP' || echo 'Service is DOWN'"

